name: BitEver RPC Explorer CI/CD

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # SilverRuler 님의 아이디를 직접 적용했습니다.
          tags: |
            silverruler/bitever-rpc-explorer:latest
            silverruler/bitever-rpc-explorer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 우분투 환경을 고려한 docker compose 설정 체크
      - name: Docker Compose Config Check
        run: |
          docker compose config
